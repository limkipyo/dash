@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --text: #e8e8f0;
  --text2: #9898b0;
  --accent: #6c5ce7;
  --liber: #ff6b9d;
  --vivian: #ffd93d;
  --mumchit: #6bcb77;
  --wdress: #4d96ff;
  --snuggle: #ff922b;
  --pos: #6bcb77;
  --neg: #ff6b6b;
  --mix: #ffd93d;
  --neutral: #666;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* Header */
.header {
  padding:40px 48px 20px;
  background:linear-gradient(135deg, #0a0a0f 0%, #1a1028 50%, #0a0a0f 100%);
  border-bottom:1px solid var(--border);
}
.header h1 {
  font-size:28px;
  font-weight:900;
  letter-spacing:-1px;
  background:linear-gradient(135deg, #ff6b9d, #6c5ce7, #4d96ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header .sub {
  color:var(--text2);
  font-size:13px;
  margin-top:6px;
}
.header .stats {
  display:flex;
  gap:24px;
  margin-top:16px;
}
.header .stat {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 20px;
  font-size:13px;
}
.header .stat strong {
  font-size:22px;
  font-weight:700;
  display:block;
  margin-bottom:2px;
}

/* Tabs */
.tabs {
  display:flex;
  gap:0;
  padding:0 48px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:100;
}
.tab {
  padding:14px 24px;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  color:var(--text2);
  border-bottom:2px solid transparent;
  transition:all .2s;
  user-select:none;
}
.tab:hover { color:var(--text); }
.tab.active {
  color:var(--accent);
  border-bottom-color:var(--accent);
  font-weight:600;
}

/* Content */
.content { padding:32px 48px; }
.panel { display:none; }
.panel.active { display:block; }

/* Bubble Chart */
#bubble-container {
  width:100%;
  height:620px;
  background:radial-gradient(ellipse at 30% 20%, #1a1a30 0%, #12121a 50%, #0a0a12 100%);
  border-radius:16px;
  border:1px solid var(--border);
  position:relative;
  overflow:hidden;
}
#bubble-svg .bubble-group { cursor:pointer; }
#bubble-svg .bubble-group:hover .bubble-main { filter:brightness(1.2); }
#bubble-svg .bubble-group:hover { transform-origin:center; }
.bubble-nav {
  position:absolute;
  top:16px;
  left:20px;
  display:flex;
  gap:8px;
  align-items:center;
  z-index:10;
}
.bubble-nav span {
  font-size:13px;
  color:var(--text2);
  cursor:pointer;
  transition:color .2s;
}
.bubble-nav span:hover { color:var(--text); }
.bubble-nav span.current { color:var(--accent); font-weight:600; }
.bubble-nav .sep { color:#444; }
.bubble-hint {
  position:absolute;
  bottom:16px;
  right:20px;
  font-size:12px;
  color:var(--text2);
  opacity:.6;
}

/* Keyword section */
.kw-grid {
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:16px;
}
.kw-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;

.kw-card:hover { border-color:var(--accent); }
.kw-card .brand-name {

.kw-card .brand-dot {

}
.kw-bar-row {

.kw-bar-label {

}

// ═══════════════════════════════════════

let bubbleLevel = 0;

function initBubble() {

// SVG defs for 3D bubble effect
function ensureDefs(svg) {
  let defs = svg.select('defs');
  if (defs.empty()) defs = svg.append('defs');
  return defs;
}

function create3DBubbleGradient(defs, id, baseColor) {
  // Remove existing
  defs.select('#' + id).remove();
  defs.select('#' + id + '-shadow').remove();
  defs.select('#' + id + '-shine').remove();

  // Main radial gradient (3D sphere)
  const grad = defs.append('radialGradient').attr('id', id)
    .attr('cx', '35%').attr('cy', '30%').attr('r', '65%');
  const c = d3.color(baseColor);
  const lighter = d3.color(baseColor); lighter.opacity = 1;
  grad.append('stop').attr('offset', '0%').attr('stop-color', d3.rgb(c).brighter(1.5));
  grad.append('stop').attr('offset', '40%').attr('stop-color', baseColor);
  grad.append('stop').attr('offset', '100%').attr('stop-color', d3.rgb(c).darker(1.8));

  // Drop shadow filter
  const filter = defs.append('filter').attr('id', id + '-shadow')
    .attr('x', '-30%').attr('y', '-30%').attr('width', '160%').attr('height', '160%');
  filter.append('feDropShadow').attr('dx', 0).attr('dy', 4).attr('stdDeviation', 8)
    .attr('flood-color', baseColor).attr('flood-opacity', 0.35);

  // Shine overlay gradient
  const shine = defs.append('radialGradient').attr('id', id + '-shine')
    .attr('cx', '32%').attr('cy', '25%').attr('r', '50%');
  shine.append('stop').attr('offset', '0%').attr('stop-color', '#fff').attr('stop-opacity', 0.6);
  shine.append('stop').attr('offset', '100%').attr('stop-color', '#fff').attr('stop-opacity', 0);
}

// Force simulation for floating bubbles

function stopSimulation() {
  if (activeSimulation) { activeSimulation.stop(); activeSimulation = null; }
}

function floatingForce(nodes, w, h, svg, onClickFn) {
  stopSimulation();

  const sim = d3.forceSimulation(nodes)
    .force('x', d3.forceX(d => d.tx).strength(0.04))
    .force('y', d3.forceY(d => d.ty).strength(0.04))
    .force('collide', d3.forceCollide(d => d.r + 4).strength(0.8))
    .force('charge', d3.forceManyBody().strength(-2))
    .alphaDecay(0.008)
    .velocityDecay(0.3)
    .on('tick', () => {
      svg.selectAll('.bubble-group')
        .attr('transform', d => `translate(${d.x},${d.y})`);
    });

  // Gentle random nudges for floating effect
  const nudgeInterval = setInterval(() => {
    if (!activeSimulation) { clearInterval(nudgeInterval); return; }
    nodes.forEach(d => {
      d.vx += (Math.random() - 0.5) * 0.8;
      d.vy += (Math.random() - 0.5) * 0.8;
    });
    sim.alpha(0.1).restart();
  }, 2000);

  activeSimulation = sim;
  return sim;
}

function updateBubbleNav() {
  const nav = document.getElementById('bubble-nav');
  nav.innerHTML = bubblePath.map((p, i) => {
    const isCurrent = i === bubblePath.length - 1;
    const sep = i > 0 ? '<span class="sep">›</span>' : '';
    return sep + `<span class="${isCurrent ? 'current' : ''}" onclick="navTo(${i})">${p}</span>`;
  }).join('');
}

function navTo(level) {
  if(level === 0) drawBubbleLevel0();
  else if(level === 1) drawBubbleLevel1(bubblePath[1]);
}

function initVoice() {

  filter.innerHTML = `<button class="active" data-brand="">전체</button>` +
    BRANDS.map(b => `<button data-brand="${b}">${b}${b==='리베르'?' ★':''}</button>`).join('');

  filter.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      filter.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      renderVoice(btn.dataset.brand);
    });
  });

  // Sentiment donuts
  const sentGrid = document.getElementById('sent-grid');
  sentGrid.innerHTML = BRANDS.map(brand => {
    const s = sentData[brand];
    const color = BRAND_COLORS[brand];

    return `<div class="sent-card" style="${isOurs?'border-color:var(--liber)':''}">

        <span><span class="dot" style="background:var(--neg)"></span>부정 ${s.부정.toFixed(0)}%</span>
        <span><span class="dot" style="background:var(--mix)"></span>혼합 ${s.혼합.toFixed(0)}%</span>
        <span><span class="dot" style="background:var(--neutral)"></span>중립 ${s.중립.toFixed(0)}%</span>
      </div>
    </div>`;
  }).join('');

  // Draw donuts
  document.querySelectorAll('.donut').forEach(svg => {
    const brand = svg.dataset.brand;
    const s = sentData[brand];
    const data = [
      {label:'긍정',value:s.긍정,color:'#6bcb77'},
      {label:'부정',value:s.부정,color:'#ff6b6b'},

    const arc = d3.arc().innerRadius(inner).outerRadius(r);

    g.selectAll('path').data(pie(data)).enter().append('path')

    g.append('text').attr('text-anchor','middle').attr('dy','0.35em')
      .attr('fill','#fff').attr('font-size','16px').attr('font-weight','700')

}

// ═══════════════════════════════════════
// RAW DATA TAB
// ═══════════════════════════════════════
let allRawData = [];

async function loadRawData() {
  // Parse CSV from embedded data (simplified — we use the pre-analyzed data)
  try {
    const resp = await fetch('/mnt/user-data/uploads/reviews_섬유향수_all.csv');
    const text = await resp.text();
    // Simple CSV parse
    const lines = text.split('\n');
    const headers = lines[0].replace(/^\uFEFF/,'').split(',');
    allRawData = lines.slice(1).filter(l=>l.trim()).map(line => {
      const vals = parseCSVLine(line);
      const obj = {};
      headers.forEach((h,i) => obj[h.trim()] = (vals[i]||'').trim());
      return obj;
    });
  } catch(e) {
    // Fallback: generate sample data
    allRawData = [];
  }
  initRawFilters();
  renderRaw();
}

function parseCSVLine(line) {
  const result = [];
  let current = '', inQuotes = false;
  for(let i=0; i<line.length; i++) {
    const c = line[i];
    if(c === '"') { inQuotes = !inQuotes; }
    else if(c === ',' && !inQuotes) { result.push(current); current = ''; }
    else { current += c; }
  }
  result.push(current);
  return result;
}

function classifySentiment(text) {
  const posWords = ['좋아','좋은','좋고','최고','만족','추천','대박','사랑','은은','고급','깔끔','상쾌','부드러','포근','재구매','쟁여','인생','미쳤','완벽','향기'];
  const negWords = ['별로','실망','아쉬','안좋','역한','두통','머리아','강한','인공','호불호','짧은','날아가','안남','환불','후회','불만'];
  const pos = posWords.filter(w => text.includes(w)).length;
  const neg = negWords.filter(w => text.includes(w)).length;
  if(pos > neg) return '긍정';
  if(neg > pos) return '부정';
  if(pos > 0) return '혼합';
  return '중립';
}

function initRawFilters() {
  const brandSel = document.getElementById('raw-brand-filter');
  BRANDS.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    brandSel.appendChild(opt);
  });
  const sentSel = document.getElementById('raw-sent-filter');
  ['긍정','부정','혼합','중립'].forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sentSel.appendChild(opt);
  });

  document.getElementById('raw-search').addEventListener('input', renderRaw);
  brandSel.addEventListener('change', renderRaw);
  sentSel.addEventListener('change', renderRaw);
}

function renderRaw() {
  const search = document.getElementById('raw-search').value.toLowerCase();
  const brand = document.getElementById('raw-brand-filter').value;
  const sent = document.getElementById('raw-sent-filter').value;

  let filtered = allRawData.filter(r => {
    if(brand && r.brand !== brand) return false;
    const text = (r.review_text || '');
    const s = classifySentiment(text);
    if(sent && s !== sent) return false;
    if(search && !text.toLowerCase().includes(search)) return false;
    return true;
  });

  document.getElementById('raw-count').textContent = `${filtered.length}건`;

  const tbody = document.getElementById('raw-tbody');
  tbody.innerHTML = filtered.slice(0, 200).map(r => {
    const s = classifySentiment(r.review_text || '');
    const sColor = s==='긍정'?'var(--pos)':s==='부정'?'var(--neg)':s==='혼합'?'var(--mix)':'var(--neutral)';
    const opt = (r.option||'').replace('[옵션] ','').replace('[한정기획] ','').replace('[시그니처] ','');
    return `<tr>
      <td><span style="color:${BRAND_COLORS[r.brand]||'#fff'};font-weight:600">${r.brand||''}</span></td>
      <td style="font-size:11px">${opt}</td>
      <td title="${(r.review_text||'').replace(/"/g,'&quot;')}">${(r.review_text||'').substring(0,120)}${(r.review_text||'').length>120?'...':''}</td>
      <td><span style="color:${sColor};font-weight:600">${s}</span></td>
      <td style="font-size:11px;color:var(--text2)">${r.date||''}</td>
    </tr>`;
  }).join('');
}
